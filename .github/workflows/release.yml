name: release

on:
  workflow_dispatch:
    inputs:
      group:
        description: 'Release group: platform-packages | client-applications'
        required: true
        default: 'platform-packages'
        type: choice
        options:
          - platform-packages
          - client-applications

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PRIVATE_TOKEN: ${{ secrets.NPM_PRIVATE_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
          if [ -n "$NPM_PRIVATE_TOKEN" ]; then
            npm config set //npm.private.com/:_authToken "$NPM_PRIVATE_TOKEN"
          fi

      - name: Version + changelog + tag (Nx Release)
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          npx nx release --groups "${{ inputs.group }}" --yes

      - name: Publish (npm)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PRIVATE_TOKEN: ${{ secrets.NPM_PRIVATE_TOKEN }}
        run: |
          npx nx release publish --groups "${{ inputs.group }}" --yes
